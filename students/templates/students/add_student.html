<!DOCTYPE html>
<html>
<head>
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card p-4 shadow">
        <h2 class="text-center">Add Student</h2>
        <form method="POST">
            {% csrf_token %}
            <input type="text" class="form-control mt-3" name="name" placeholder="Student Name">

            <input type="text" class="form-control mt-3" name="roll" placeholder="Roll Number">

            <input type="text" class="form-control mt-3" name="course" placeholder="Course">

            <input type="number" class="form-control mt-3" name="marks" placeholder="Marks">

            <button class="btn btn-success mt-3 w-100">
                Save Student
            </button>
        </form>
    </div>
</div>
</body>
</html>
